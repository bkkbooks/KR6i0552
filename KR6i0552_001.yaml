body:
  text: 作供梵嘆如常依慈氏禮聲志心歸命禮法身非相應化非真福智無比無為福勝一相無相化無所化無斷無滅法界通化莊嚴淨土如理實見離色離見一切佛寶善現起請尊重正教無法可得依法出生一禮合相法會因由大乘正宗無德無説持經功德如法受持非説所説一切法寶妙行無住正信希有離相寂滅能淨業障一躰同觀威儀寂靜究竟無我知見不生淨心行善不愛不貪無諍三昧一切僧寶志心普奉為三十二分滿一十八住圓二十七疑遣德海難思議四恩并七趣法界諸群生罪障皆消滅速圓般若海志心懺悔志心普懺願先身有報障今日受持經暫被人輕賤轉重復還輕唯願八金剛清淨四菩薩我今與衆生速圓般若海唱處世界處世界如虛空如蓮花不著水心清淨超於彼啓首禮無上尊吟回向偈我以普賢殊勝行無邊勝福皆回向普願沈溺諸衆生速往無量光佛所志心普命十身無礙佛法報化三身十藏甚深法戒定慧三乘願共諸衆生皆共成佛道十地聖賢僧上中下三根禮懺歸依竟所集諸聖因施一切群生皆共成佛道
